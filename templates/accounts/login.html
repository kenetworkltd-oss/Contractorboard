{% extends 'base.html' %}

{% block title %}Login — ContractorBoard{% endblock %}

{% block content %}
<section class="site-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-sm">
          <div class="card-body p-5">
            <h3 class="mb-4 text-center">Login</h3>
            <form method="POST">
              {% csrf_token %}
              {{ form.as_p }}
              <button type="submit" class="btn btn-primary btn-block btn-lg mt-3">
                Login
              </button>
            </form>
            <hr>
            <p class="text-center mb-2">
              <a href="{% url 'register_homeowner' %}">Register as Homeowner</a>
            </p>
            <p class="text-center mb-0">
              <a href="{% url 'register_contractor' %}">Register as Contractor</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
