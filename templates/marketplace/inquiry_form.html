{% extends 'base.html' %}

{% block title %}Send Inquiry — {{ job.title }}{% endblock %}

{% block content %}
<section class="site-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-7">
        <div class="card shadow-sm">
          <div class="card-body p-5">
            <h3 class="mb-2">Send Inquiry</h3>
            <p class="text-muted mb-4">
              Applying for: <strong>{{ job.title }}</strong> — 
              {{ job.location }}
            </p>
            <form method="POST">
              {% csrf_token %}
              <div class="form-group">
                <label>Your Message</label>
                {{ form.message }}
                <small class="text-muted">
                  Describe your experience, availability and estimated cost.
                </small>
              </div>
              <button type="submit" class="btn btn-primary btn-lg btn-block">
                Send Inquiry
              </button>
              <a href="{% url 'job_detail' job.pk %}" 
                class="btn btn-outline-secondary btn-block mt-2">
                Cancel
              </a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
