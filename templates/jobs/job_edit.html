{% extends 'base.html' %}

{% block title %}Edit Job — ContractorBoard{% endblock %}

{% block content %}
<section class="site-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card shadow-sm">
          <div class="card-body p-5">
            <h3 class="mb-4">Edit Job</h3>
            <form method="POST">
              {% csrf_token %}
              {% for field in form %}
              <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                <small class="text-danger">{{ field.errors }}</small>
                {% endif %}
              </div>
              {% endfor %}
              <button type="submit" class="btn btn-primary btn-lg">
                Save Changes
              </button>
              <a href="{% url 'job_detail' job.pk %}" 
                class="btn btn-outline-secondary btn-lg ml-2">
                Cancel
              </a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
